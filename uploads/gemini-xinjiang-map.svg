<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1365 768" role="img" aria-labelledby="title desc">
  <title id="title">Strategic map of Xinjiang in the People's Republic of China</title>
  <desc id="desc">A stylized geopolitical map highlighting Xinjiang, neighboring states, major cities, Muslim population concentration, and strategic border dimensions.</desc>

  <defs>
    <linearGradient id="paper" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f5efe3" />
      <stop offset="100%" stop-color="#eee6d8" />
    </linearGradient>

    <pattern id="diagonal" patternUnits="userSpaceOnUse" width="32" height="32" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="32" stroke="#ddd1bf" stroke-width="2" stroke-opacity="0.45" />
    </pattern>

    <pattern id="grid" patternUnits="userSpaceOnUse" width="48" height="48">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#d9cebd" stroke-width="1.1" />
    </pattern>

    <pattern id="prc-dots" patternUnits="userSpaceOnUse" width="18" height="18">
      <circle cx="3" cy="3" r="1.4" fill="#bfb5a3" fill-opacity="0.65" />
    </pattern>

    <pattern id="xinjiang-hatch" patternUnits="userSpaceOnUse" width="16" height="16" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="16" stroke="#9b3833" stroke-width="2" stroke-opacity="0.55" />
    </pattern>

    <filter id="green-blur">
